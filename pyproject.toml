[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "time-reversal"
version = "0.1.0"
description = "Time reversal generative models"
readme = "README.md"
requires-python = ">=3.10"
license = {file = "LICENSE"}
authors = [
  {name = "Rouchouse Damien", email = "damien.rouchouse@etu.minesparis.psl.eu"},
]
dependencies = [
    "numpy",
    "torch",
]

[project.optional-dependencies]
dev = [
  "pytest",
  "pytest-cov",
  "ruff",
  "mypy",
  "black",
  "isort",
]

[tool.hatch.build.targets.wheel]
packages = ["src/time_reversal"]

[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra -q"
testpaths = [
    "tests",
]
python_files = ["test_*.py"]

[tool.ruff]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "B"]
ignore = []

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
